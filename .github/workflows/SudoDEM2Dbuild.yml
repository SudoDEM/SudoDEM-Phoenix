name: Build SudoDEM2D

on:
  push:
    branches: [main, master]
    paths:
      - 'SudoDEM2D/**'
      - '.github/workflows/SudoDEM2Dbuild.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'SudoDEM2D/**'
  workflow_dispatch:

env:
  BUILD_TYPE: Release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  SudoDEM2Dbuild:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        #os: [ubuntu-22.04, ubuntu-24.04]
        #python: ["3.10", "3.12", "3.13"]
        # exclude:
        #   - os: ubuntu-22.04
        #     python: "3.12"
        #   - os: ubuntu-24.04
        #     python: "3.10"
        os: [windows-latest]
        python: ["3.13"]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # - name: Set up Python ${{ matrix.python }}
    #   uses: actions/setup-python@v5
    #   with:
    #     python-version: ${{ matrix.python }}

    - name: Set up Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        python-version: ${{ matrix.python }}
        auto-activate-base: false
        activate-environment: sudodem

    - name: Install conda packages on Linux/macOS
      if: runner.os != 'Windows'
      shell: bash -el {0}
      run: |
        conda activate sudodem
        conda install -y numpy

    - name: Install conda packages on Windows
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        conda activate sudodem
        conda install -y numpy
        python --version
        Get-Command python

    # - name: Cache dependencies
    #   uses: actions/cache@v4
    #   with:
    #     path: |
    #       ~/.cache/pip
    #       3rdlib
    #     key: ${{ runner.os }}-${{ matrix.python }}-${{ hashFiles('**/install3rd_base.sh') }}
    #     restore-keys: |
    #       ${{ runner.os }}-${{ matrix.python }}-
    #       ${{ runner.os }}-

    - name: Install system dependencies linux
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake \
          freeglut3-dev libglib2.0-dev \
          qt6-base-dev qt6-base-dev-tools \
          libgl1-mesa-dev libglu1-mesa-dev libxcb-cursor0

    - name: Install non-Qt system dependencies on macOS
      if: runner.os == 'macOS'
      shell: bash
      run: |
        brew update
        brew install cmake glib libomp

    - name: Install Qt on Win/macOS
      if: runner.os != 'Linux'
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.9.3'
        target: 'desktop'

    - name: Set Qt6_ROOT on Windows
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $qtRoot = "$env:RUNNER_WORKSPACE\Qt\6.9.3\msvc2022_64"
        "Qt6_ROOT=$qtRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        "PATH=$qtRoot\bin;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        Write-Host "Qt6_ROOT set to $qtRoot"

    - name: Set Qt6_ROOT/OpenMP_ROOT on macOS
      if: runner.os == 'macOS'
      shell: bash
      run: |
        echo "Qt6_ROOT=$QT_ROOT_DIR" >> "$GITHUB_ENV"
        echo "CMAKE_PREFIX_PATH=$QT_ROOT_DIR" >> "$GITHUB_ENV"
        echo "OpenMP_ROOT=$(brew --prefix libomp)" >> "$GITHUB_ENV"

    - name: Build and install minieigen on Linux/macOS
      if: runner.os != 'Windows'
      shell: bash -el {0}
      run: |
        conda activate sudodem
        mkdir -p build_minieigen
        cd build_minieigen
        cmake ../minieigen
        make -j4
        make install

    - name: Build and install minieigen on Windows
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        conda activate sudodem
        New-Item -ItemType Directory -Force -Path build_minieigen | Out-Null
        Set-Location build_minieigen
        cmake ../minieigen -G "Visual Studio 17 2022" -A x64
        cmake --build . --config Release --parallel 4
        cmake --install . --config Release

    - name: Build SudoDEM2D on Linux/macOS
      if: runner.os != 'Windows'
      shell: bash -el {0}
      run: |
        mkdir -p build2d
        cd build2d
        cmake ../SudoDEM2D
        make -j4
        make install

    - name: Build SudoDEM2D on Windows
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path build2d | Out-Null
        Set-Location build2d
        cmake ../SudoDEM2D -G "Visual Studio 17 2022" -A x64
        cmake --build . --config Release --parallel 4
        cmake --install . --config Release
        cmake --build . --target minieigen_install --config Release
        cmake --build . --target pack_win --config Release


    - name: Copy minieigen library on Windows
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $files = Get-ChildItem "${{ github.workspace }}\minieigen\lib" -Filter "minieigen*" -ErrorAction SilentlyContinue
        if (-not $files) {
          throw "No file starting with minieigen found under ${{ github.workspace }}\minieigen\lib"
        }
        Copy-Item "${{ github.workspace }}\minieigen\lib\minieigen*" "${{ github.workspace }}\SudoDEM2D_install\lib\sudodem\py\" -Force
            
    - name: Archive compiled SudoDEM2D on Linux/macOS
      if: runner.os != 'Windows'
      working-directory: ${{ github.workspace }}
      shell: bash
      run: |
        tar cfJ SudoDEM2D-${{ matrix.os }}-py${{ matrix.python }}.tar.xz SudoDEM2D_install

    - name: Archive compiled SudoDEM2D on Windows
      if: runner.os == 'Windows'
      working-directory: ${{ github.workspace }}
      shell: pwsh
      run: |
        Compress-Archive -Path SudoDEM2D_install -DestinationPath SudoDEM2D-${{ matrix.os }}-py${{ matrix.python }}.zip -Force

    - name: Upload artifact on Linux/macOS
      if: runner.os != 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: SudoDEM2D-${{ matrix.os }}-py${{ matrix.python }}
        path: ${{ github.workspace }}/SudoDEM2D-${{ matrix.os }}-py${{ matrix.python }}.tar.xz
        retention-days: 7

    - name: Upload artifact on Windows
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: SudoDEM2D-${{ matrix.os }}-py${{ matrix.python }}
        path: ${{ github.workspace }}/SudoDEM2D-${{ matrix.os }}-py${{ matrix.python }}.zip
        retention-days: 7